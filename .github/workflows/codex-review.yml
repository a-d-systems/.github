# Codex Review — 組織共通の再利用可能ワークフロー
#
# PRに対してCodex公式GitHub Actionでコードレビューを実行し、結果をPRコメントとして投稿する。
# Phase 1: レビュー結果の投稿のみ。修正はDeveloperがlocal Claude Codeで対応。
#
# トリガー:
#   - PR作成（ready状態）/ ドラフト→ready / ready状態でpush
#   - PRコメントで @codex メンション
#
# 呼び出し側の設定例は codex-review-caller.yml を参照。

name: Codex Review

on:
  workflow_call:
    inputs:
      pr_number:
        description: "PR番号"
        type: number
        required: true
      review_focus:
        description: "重点レビュー観点（省略時はデフォルト観点）"
        type: string
        default: ""
    secrets:
      OPENAI_API_KEY:
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Codex Review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout (merge ref)
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ inputs.pr_number }}/merge
          fetch-depth: 0

      - name: Pre-fetch base and head refs
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          BASE_REF=$(gh pr view "${PR_NUMBER}" --repo "${{ github.repository }}" --json baseRefName -q '.baseRefName')
          git fetch --no-tags origin "${BASE_REF}" "+refs/pull/${PR_NUMBER}/head"

      - name: Build review prompt
        env:
          REVIEW_FOCUS: ${{ inputs.review_focus }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          BASE_REF=$(gh pr view "${PR_NUMBER}" --repo "${{ github.repository }}" --json baseRefName -q '.baseRefName')

          FOCUS_LINE=""
          if [ -n "${REVIEW_FOCUS}" ]; then
            FOCUS_LINE="重点観点: ${REVIEW_FOCUS}"
          fi

          cat > /tmp/review_prompt.md << PROMPT_EOF
          このPRの変更をレビューせよ。

          base branch: origin/${BASE_REF}

          観点: correctness, security, perf, maintainability, testing, style
          ${FOCUS_LINE}

          レビュー結果は以下のフォーマットで出力せよ:

          ## Codex Review Result

          | | |
          |---|---|
          | **Status** | ✅ OK or ❌ Blocking issues found |

          ### Summary
          変更の要約

          ### Issues（問題がある場合のみ）

          | Severity | Category | Location | Problem | Recommendation |
          |---|---|---|---|---|
          | blocking/advisory | category | file:lines | 問題 | 修正案 |

          ---
          *Codex Review (Phase 1) — auto-generated. Fix locally with Claude Code, then push to re-trigger.*
          PROMPT_EOF

      - name: Run Codex Review
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: ${{ vars.CODEX_REVIEW_MODEL || 'gpt-5.3-codex' }}
          prompt-file: /tmp/review_prompt.md
          sandbox: read-only
          safety-strategy: drop-sudo

      - name: Post review comment
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          CODEX_OUTPUT: ${{ steps.codex.outputs.final-message }}
        run: |
          if [ -z "${CODEX_OUTPUT}" ]; then
            BODY="## Codex Review Result

          | | |
          |---|---|
          | **Status** | ⚠️ Review produced no output — check CI logs |

          ---
          *Codex Review (Phase 1) — auto-generated.*"
            gh pr comment "${PR_NUMBER}" --body "${BODY}"
            exit 1
          fi

          gh pr comment "${PR_NUMBER}" --body "${CODEX_OUTPUT}"

          if echo "${CODEX_OUTPUT}" | grep -qi "blocking"; then
            echo "::error::Codex Review found blocking issues"
            exit 1
          fi
